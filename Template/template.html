<!--
    Why this file exists: HTML (HyperText Markup Language) provides the fundamental
    structure and semantic meaning of web content. A well-structured HTML document
    improves accessibility (for screen readers) and SEO (Search Engine Optimization).
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <!--
        Why metadata is included: Metadata defines the character set, viewport settings,
        and title, which are crucial for rendering the page correctly on different devices
        and in search engines.
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Fundamentals</title>
</head>
<body>
    <!--
        Why we use semantic tags like <header>, <main>, and <footer>:
        They give theoretical context to the browser about the purpose of the content,
        unlike generic <div> tags which hold no semantic value.
    -->
    <header>
        <h1>Main Application Title</h1>
    </header>

    <main>
        <section id="introduction">
            <h2>About This Application</h2>
            <p>This is a fundamental building block of the web interface.</p>
        </section>

        <!--
            Why use forms with proper input types and labels:
            It ensures data integrity at the client level and improves user experience
            by providing appropriate mobile keyboards (e.g., email keyboard).
        -->
        <section id="contact-form">
            <form action="/submit" method="POST">
                <label for="user-email">Email Address:</label>
                <input type="email" id="user-email" name="userEmail" required>
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Developer Student. All rights reserved.</p>
    </footer>
</body>
</html>
