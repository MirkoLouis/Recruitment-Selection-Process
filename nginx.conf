worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    
    keepalive_timeout  65;
    keepalive_requests 1000;
    
    types_hash_max_size 2048;
    
    # Open File Cache
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Optimal GZIP Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstream for RSP Portal (running on port 3001)
    upstream portal_backend {
        server 127.0.0.1:3001;
        keepalive 32;
    }

    # Upstream for RSP Dashboard (running on port 3000)
    upstream dashboard_backend {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # Server block for RSP Portal (Public Site)
    server {
        listen 80;
        server_name _;

        # Optional: Add explicit caching for static assets in Nginx
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|eot|ttf|svg)$ {
            proxy_pass http://portal_backend;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        location / {
            proxy_pass http://portal_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Forward original client IPs
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # Server block for RSP Dashboard (Admin Site)
    server {
        listen 8080;
        server_name _;

        # Optional: Add explicit caching for static assets in Nginx
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|eot|ttf|svg)$ {
            proxy_pass http://dashboard_backend;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        location / {
            proxy_pass http://dashboard_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Forward original client IPs
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
